version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    ignore:
      # tsup's .d.ts generation (rollup-plugin-dts) doesn't support TypeScript 7
      # yet, which breaks `pnpm build`. Pin to v6 until the tooling catches up.
      - dependency-name: "typescript"
        versions: ["7.x"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 1
